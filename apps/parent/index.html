<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>Beyond Parental Controls</title>
<style>
  :root { color-scheme: light dark; --bg:#faf9f6; --text:#23272b; --muted:#5f6873; --accent:#155e75; }
  @media (prefers-color-scheme: dark){ :root{ --bg:#15181b; --text:#d8dce1; --muted:#98a2ac; --accent:#67bccd; } }
  * { box-sizing: border-box; }
  body { margin:0; min-height:100vh; display:grid; place-items:center; padding:24px;
    background:var(--bg); color:var(--text);
    font:17px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased; }
  main { max-width:560px; text-align:center; }
  h1 { font-size:1.9rem; letter-spacing:-.02em; margin:0 0 .4em; }
  p { color:var(--muted); margin:.4em 0; }
  .tag { display:inline-block; margin-top:1.4em; padding:5px 12px; border:1px solid var(--accent);
    border-radius:999px; color:var(--accent); font-size:.82rem; font-weight:600; }
</style>
</head>
<body>
  <main>
    <h1>Beyond Parental Controls</h1>
    <p>A staged plan for taking a kid from a locked-down first device to full
       online autonomy by 18 — on a deliberate schedule, not by attrition.</p>
    <p>The configurator and tailored plan live here.</p>
    <span class="tag">🚧 Coming soon</span>
  </main>
</body>
</html>
