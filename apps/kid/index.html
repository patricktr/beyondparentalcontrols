<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>Your Internet Roadmap</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="topbar"><div class="topbar-inner"><span class="glyph">🧭</span><span class="wordmark">Your Internet Roadmap</span></div></div>
<main id="doc" class="page">Loading your roadmap…</main>
<script type="module">
  import { parseConfig } from './lib/config.js';
  import { render } from './lib/render.js';
  import sections from './lib/sections.js';

  const cfg = parseConfig(new URLSearchParams(location.search));
  document.getElementById('doc').innerHTML = render(cfg, sections);
  if (cfg.child) document.title = `${cfg.child}'s Internet Roadmap`;
</script>
</body>
</html>
